<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Decode - ExarnSekolah</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Result box styles – appended on top of qr_code.css */
        #resultBox {
            display: none;
            margin-top: 16px;
            background: #f4f6ff;
            border: 2px solid #8f94fb;
            border-radius: 12px;
            padding: 16px;
            text-align: left;
            animation: fadeIn 0.4s ease;
        }

        #resultBox h3 {
            margin: 0 0 10px;
            font-size: 0.95em;
            color: #4e54c8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .steps-label {
            font-size: 0.78em;
            color: #888;
            margin: 0 0 6px;
        }

        .step-item {
            font-size: 0.75em;
            color: #aaa;
            background: #eef0ff;
            border-radius: 6px;
            padding: 4px 8px;
            margin-bottom: 4px;
            word-break: break-all;
        }

        #resultText {
            display: block;
            margin-top: 10px;
            font-size: 0.95em;
            color: #333;
            word-break: break-all;
            line-height: 1.5;
            text-decoration: none;
        }

        #resultText.is-link {
            color: #4e54c8;
            text-decoration: underline;
        }

        #copyBtn {
            display: none;
            align-items: center;
            gap: 6px;
            margin-top: 12px;
            padding: 8px 16px;
            background: #4e54c8;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.2s, transform 0.15s;
        }

        #copyBtn:hover {
            background: #8f94fb;
            transform: scale(1.04);
        }

        #copyBtn:disabled {
            opacity: 0.6;
            cursor: default;
            transform: none;
        }

        #decodeSteps {
            margin-bottom: 2px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1><i class="fas fa-qrcode"></i> Scan & Decode QR</h1>
        <select id="cameraSelect"></select>
        <button id="startButton"><i class="fas fa-camera"></i> Aktifkan Kamera</button>

        <div id="scanner" style="display: none;">
            <video id="preview" autoplay playsinline></video>
        </div>

        <!-- Result box – muncul setelah scan berhasil -->
        <div id="resultBox">
            <h3><i class="fas fa-unlock-alt"></i> Hasil Decode</h3>
            <div id="decodeSteps"></div>
            <a id="resultText" href="#"></a>
            <button id="copyBtn">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="9" y="9" width="13" height="13" rx="2" />
                    <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" />
                </svg>
                Copy
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
</body>

</html>
