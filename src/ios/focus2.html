<!DOCTYPE html>
<html lang="id" translate="no">

<head>
    <meta name="google" content="notranslate">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Focus Mode</title>
</head>

<body>
    <!-- Top bar -->
    <div id="topBar">
        <span id="clock">00:00:00</span>

        <!-- Dynamic Island pill -->
        <div id="island">
            <button id="btnRefresh" title="Refresh">
                <!-- refresh icon -->
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10" />
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
                </svg>
            </button>
            <button id="btnFullscreen" title="Fullscreen">
                <!-- expand icon -->
                <svg id="iconExpand" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 3 21 3 21 9" />
                    <polyline points="9 21 3 21 3 15" />
                    <line x1="21" y1="3" x2="14" y2="10" />
                    <line x1="3" y1="21" x2="10" y2="14" />
                </svg>
                <svg id="iconCompress" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                    stroke-linecap="round" stroke-linejoin="round" style="display:none">
                    <polyline points="4 14 10 14 10 20" />
                    <polyline points="20 10 14 10 14 4" />
                    <line x1="10" y1="14" x2="3" y2="21" />
                    <line x1="21" y1="3" x2="14" y2="10" />
                </svg>
            </button>
            <button id="btnExit" title="Keluar">
                <!-- sign-out icon -->
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
            </button>
        </div>

        <span id="battery">–%</span>
    </div>

    <!-- Iframe wrapper with 5px inset -->
    <div id="frameWrap">
        <iframe id="myIframe" scrolling="yes" frameborder="0" allowfullscreen webkitallowfullscreen mozallowfullscreen
            sandbox="allow-scripts allow-modals allow-forms allow-same-origin allow-popups">
        </iframe>
    </div>

    <!-- Overlay asking to go fullscreen -->
    <div id="overlay">
        <div>Please enter fullscreen to interact with the page.</div>
        <button id="fullscreenBtn">Go Fullscreen</button>
    </div>

    <!-- Custom alert -->
    <div id="customAlert"></div>
</body>

</html>
