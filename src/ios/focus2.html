<!DOCTYPE html>
<html lang="en" translate="no">
<head>
    <meta name="google" content="notranslate">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fullscreen Page</title>
</head>
<body>
    <div id="overlay">Please enter fullscreen to interact with the page.</div>
    <button id="fullscreenBtn">Go Fullscreen</button>
    <div id="draggable" class="draggable-circle"></div>
    <iframe id="myIframe" 
        border='0' 
        width='100vw' 
        height='100vh' 
        scrolling='true' 
        marginheight='0' 
        marginwidth='0' 
        frameborder='0' 
        style='position:fixed; left:0; top:0;' 
        allowfullscreen='true' 
        webkitallowfullscreen='true' 
        mozallowfullscreen='true' 
        sandbox="allow-scripts allow-modals allow-forms allow-same-origin">
    </iframe>

    <div id="customAlert">You have lost focus! Please return to fullscreen.</div>

</body>
</html>
