<!doctype html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>QR Code Scanner - ExarnSekolah</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"><style>.status-msg{display:none;margin:10px 0;padding:10px 14px;border-radius:8px;font-size:.88em;text-align:left;transition:all .3s ease}.status-info{background:#eef0ff;color:#4e54c8;border:1px solid #c5c8f8}.status-success{background:#e8f8ee;color:#2d8653;border:1px solid #a8dab5}.status-error{background:#ffeef0;color:#c0392b;border:1px solid #f5c0bb}.status-loading{background:#fff8e1;color:#b07a00;border:1px solid #ffe082}@keyframes spin{to{transform:rotate(360deg)}}.fa-spin{display:inline-block;animation:spin 1s linear infinite}</style><script defer="defer" src="/js/qr_code.bundle.js"></script><link href="/css/qr_code.css" rel="stylesheet"></head><body><div class="container"><h1><i class="fas fa-qrcode"></i> Scan QR Code</h1><select id="cameraSelect"></select><div id="statusMsg" class="status-msg"></div><button id="startButton" disabled="disabled"><i class="fas fa-spinner fa-spin"></i> Memuat…</button><div id="scanner" style="display:none"><video id="preview" autoplay playsinline></video></div></div><script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script></body></html>
