<!doctype html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>QR Decode - ExarnSekolah</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"><style>.status-msg{display:none;margin:10px 0;padding:10px 14px;border-radius:8px;font-size:.88em;text-align:left;transition:all .3s ease}.status-info{background:#eef0ff;color:#4e54c8;border:1px solid #c5c8f8}.status-success{background:#e8f8ee;color:#2d8653;border:1px solid #a8dab5}.status-error{background:#ffeef0;color:#c0392b;border:1px solid #f5c0bb}.status-loading{background:#fff8e1;color:#b07a00;border:1px solid #ffe082}@keyframes spin{to{transform:rotate(360deg)}}.fa-spin{display:inline-block;animation:spin 1s linear infinite}#resultBox{display:none;margin-top:16px;background:#f4f6ff;border:2px solid #8f94fb;border-radius:12px;padding:16px;text-align:left;animation:fadeIn .4s ease}#resultBox h3{margin:0 0 10px;font-size:.95em;color:#4e54c8;text-transform:uppercase;letter-spacing:.05em}.steps-label{font-size:.78em;color:#888;margin:0 0 6px}.step-item{font-size:.75em;color:#aaa;background:#eef0ff;border-radius:6px;padding:4px 8px;margin-bottom:4px;word-break:break-all}#resultText{display:block;margin-top:10px;font-size:.95em;color:#333;word-break:break-all;line-height:1.5;text-decoration:none}#resultText.is-link{color:#4e54c8;text-decoration:underline}#copyBtn{display:none;align-items:center;gap:6px;margin-top:12px;padding:8px 16px;background:#4e54c8;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:.9em;transition:background .2s,transform .15s}#copyBtn:hover{background:#8f94fb;transform:scale(1.04)}#copyBtn:disabled{opacity:.6;cursor:default;transform:none}</style><script defer="defer" src="/js/qr_code_decode.bundle.js"></script><link href="/css/qr_code_decode.css" rel="stylesheet"></head><body><div class="container"><h1><i class="fas fa-qrcode"></i> Scan &amp; Decode QR</h1><select id="cameraSelect"></select><div id="statusMsg" class="status-msg"></div><button id="startButton" disabled="disabled"><i class="fas fa-spinner fa-spin"></i> Memuat…</button><div id="scanner" style="display:none"><video id="preview" autoplay playsinline></video></div><div id="resultBox"><h3><i class="fas fa-unlock-alt"></i> Hasil Decode</h3><div id="decodeSteps"></div><a id="resultText" href="#"></a> <button id="copyBtn"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy</button></div></div><script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script></body></html>
